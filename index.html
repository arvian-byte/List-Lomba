<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Timeline Lomba & Call for Papers</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg-color: #0f172a;
            --table-bg: #1e293b;
            --text-main: #f8fafc;
            --col-name: #facc15;
            --col-deadline: #ff4d4d;
            --col-prize: #4ade80;
            --btn-bg: #3b82f6;
            --btn-hover: #2563eb;
            --btn-submit: #10b981;
            --btn-submit-hover: #059669;
            --btn-edit: #f59e0b;
            --btn-edit-hover: #d97706;
            --btn-delete: #ef4444;
            --btn-delete-hover: #dc2626;
            --border-color: #334155;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            line-height: 1.6;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: var(--table-bg);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
        }

        h1 {
            text-align: center;
            color: #fff;
            margin-bottom: 5px;
            font-size: 2.2em;
            text-shadow: 0 0 10px rgba(255,255,255,0.2);
        }

        p.subtitle {
            text-align: center;
            color: #94a3b8;
            margin-bottom: 25px;
            font-size: 1.1em;
        }

        .dashboard-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }

        .panel {
            background-color: #0f172a;
            padding: 20px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
        }

        .panel h3 {
            margin-top: 0;
            color: var(--col-name);
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 10px;
            margin-bottom: 15px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-size: 0.9em;
            color: #94a3b8;
        }

        .form-group input {
            width: 100%;
            padding: 10px;
            border-radius: 6px;
            border: 1px solid var(--border-color);
            background-color: #1e293b;
            color: white;
            box-sizing: border-box;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .btn-submit {
            width: 100%;
            padding: 12px;
            background-color: var(--btn-submit);
            color: white;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-submit:hover {
            background-color: var(--btn-submit-hover);
        }

        .btn-submit:disabled {
            background-color: #475569;
            cursor: not-allowed;
        }

        .btn-cancel {
            width: 100%;
            padding: 12px;
            background-color: #64748b;
            color: white;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
            display: none;
        }

        .btn-cancel:hover {
            background-color: #475569;
        }

        #sharedNotes {
            width: 100%;
            height: 180px;
            padding: 10px;
            border-radius: 6px;
            border: 1px solid var(--border-color);
            background-color: #1e293b;
            color: white;
            resize: vertical;
            box-sizing: border-box;
            font-family: inherit;
        }

        .save-status {
            font-size: 0.8em;
            color: var(--col-prize);
            margin-top: 5px;
            text-align: right;
            display: none;
        }

        .search-container {
            margin-bottom: 20px;
            position: relative;
        }

        #searchInput {
            width: 100%;
            padding: 15px 20px;
            font-size: 16px;
            background-color: #0f172a;
            color: white;
            border: 2px solid var(--border-color);
            border-radius: 8px;
            box-sizing: border-box;
            transition: border-color 0.3s;
        }

        #searchInput:focus {
            outline: none;
            border-color: var(--col-name);
        }

        .table-responsive {
            overflow-x: auto;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            position: relative;
        }

        table {
            width: 100%;
            border-collapse: collapse; /* Kembali menggunakan mode collapse agar garis tabel rapi */
            white-space: nowrap;
        }

        th, td {
            padding: 18px 20px;
            text-align: left;
            border-bottom: 1px solid var(--border-color);
            font-size: 1.05em;
        }

        th {
            font-weight: 700;
            letter-spacing: 1px;
            cursor: pointer;
            position: sticky;
            top: 0;
            text-transform: uppercase;
            background-color: #0f172a;
        }

        th:hover {
            background-color: #000;
        }

        tbody tr {
            transition: background-color 0.2s ease;
        }

        tbody tr:hover {
            background-color: #334155;
        }

        td.lomba-name {
            color: var(--col-name);
            font-weight: 900;
            font-size: 1.1em;
            text-shadow: 0 0 5px rgba(250, 204, 21, 0.3);
            white-space: normal; /* Tetap melipat teks ke bawah jika kepanjangan */
            min-width: 220px; /* Lebar kolom nama lomba agar ideal di laptop maupun HP */
        }

        td.lomba-deadline {
            color: var(--col-deadline);
            font-weight: bold;
            font-size: 1.1em;
        }

        td.lomba-prize {
            color: var(--col-prize);
            font-weight: bold;
        }

        .btn-link {
            display: inline-block;
            padding: 8px 14px;
            background-color: var(--btn-bg);
            color: #ffffff;
            text-decoration: none;
            border-radius: 6px;
            font-weight: bold;
            font-size: 0.9em;
            transition: all 0.3s ease;
            text-align: center;
        }

        .btn-link:hover {
            background-color: var(--btn-hover);
            transform: scale(1.05);
        }

        .btn-disabled {
            background-color: #475569;
            color: #94a3b8;
            cursor: not-allowed;
            pointer-events: none;
        }

        .action-cell {
            display: flex;
            gap: 5px;
        }

        .btn-edit-item {
            background-color: var(--btn-edit);
            color: white;
            border: none;
            padding: 8px 12px;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            font-size: 0.9em;
        }

        .btn-edit-item:hover {
            background-color: var(--btn-edit-hover);
        }

        .btn-delete-item {
            background-color: var(--btn-delete);
            color: white;
            border: none;
            padding: 8px 12px;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            font-size: 0.9em;
        }

        .btn-delete-item:hover {
            background-color: var(--btn-delete-hover);
        }

        .no-data {
            text-align: center;
            padding: 20px;
            color: var(--col-deadline);
            font-weight: bold;
            display: none;
            font-size: 1.2em;
        }

        #loadingOverlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(15, 23, 42, 0.8);
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            font-weight: bold;
            z-index: 10;
        }

        @media (max-width: 768px) {
            .dashboard-grid { grid-template-columns: 1fr; }
            .container { padding: 15px; }
            th, td { padding: 12px 10px; font-size: 0.95em; }
            td.lomba-name { white-space: normal; min-width: 180px; }
        }
    </style>
</head>
<body>

            { name: "Cfp BI Yogyakarta", sortDate: "2026-08-31", deadlineText: "31 Agustus", prize: "20 jt", link: "https://www.instagram.com/p/DWgfWDKEuah/?img_index=4&igsh=ejF2aHk2M3g3eWEw" },
            { name: "Call for Paper LPS", sortDate: "2026-09-25", deadlineText: "25 September", prize: "30 jt", link: "https://www.instagram.com/p/DWkmE2Mj0Wm/?img_index=3&igsh=cHlrbmJucHozdmdm" },
            { name: "CALL FOR PAPER – Palm Oil Research & Innovation", sortDate: "2026-09-30", deadlineText: "30 September", prize: "4 jt", link: "https://www.instagram.com/p/DXEn5IGkSpZ/?igsh=N2V3OWQzMjdwcmp1" },

        // MENGAMBIL DATA DARI SUPABASE SAAT HALAMAN DIBUKA
        async function fetchData() {
            try {
                // 1. Ambil Catatan
                const { data: noteData, error: noteError } = await db.from('notes').select('content').eq('id', 1).single();
                if (noteData) {
                    document.getElementById('sharedNotes').value = noteData.content;
                }

                // 2. Ambil List Lomba
                const { data: lombaData, error: lombaError } = await db.from('lombas').select('*');
                
                if (lombaError) throw lombaError;

                if (lombaData && lombaData.length > 0) {
                    lombas = lombaData;
                } else {
                    // Jika database kosong, masukkan data default otomatis
                    const { data: insertedData } = await db.from('lombas').insert(defaultLombas).select();
                    lombas = insertedData || [];
                }
                
                renderTable();
            } catch (error) {
                console.error("Gagal menarik data:", error.message);
                alert("Gagal terhubung ke Database Supabase. Cek console browser.");
            } finally {
                loadingOverlay.style.display = 'none';
            }
        }

        // FUNGSI RENDER TABEL (MENAMPILKAN DATA KE HTML)
        function renderTable() {
            const filter = document.getElementById("searchInput").value.toLowerCase();
            tableBody.innerHTML = "";

            let sortedLombas = [...lombas];
            if (nameSortDirection === 'asc') {
                sortedLombas.sort((a, b) => a.name.localeCompare(b.name));
            } else if (nameSortDirection === 'desc') {
                sortedLombas.sort((a, b) => b.name.localeCompare(a.name));
            } else {
                sortedLombas.sort((a, b) => new Date(a.sortDate) - new Date(b.sortDate));
            }

            let matchCount = 0;

            sortedLombas.forEach(lomba => {
                if (lomba.name.toLowerCase().indexOf(filter) > -1 || 
                    lomba.deadlineText.toLowerCase().indexOf(filter) > -1 ||
                    lomba.prize.toLowerCase().indexOf(filter) > -1) {
                    
                    matchCount++;
                    const row = document.createElement('tr');
                    
                    let linkHtml = lomba.link ? 
                        `<a href="${lomba.link}" target="_blank" class="btn-link">Buka Link</a>` : 
                        `<a href="#" class="btn-link btn-disabled">No Link</a>`;

                    row.innerHTML = `
                        <td class="lomba-name">${lomba.name}</td>
                        <td class="lomba-deadline">${lomba.deadlineText}</td>
                        <td class="lomba-prize">${lomba.prize}</td>
                        <td>${linkHtml}</td>
                        <td class="action-cell">
                            <button class="btn-edit-item" onclick="startEdit('${lomba.id}')">✏️</button>
                            <button class="btn-delete-item" onclick="deleteItem('${lomba.id}')">🗑️</button>
                        </td>
                    `;
                    tableBody.appendChild(row);
                }
            });

            document.getElementById("noDataMessage").style.display = matchCount === 0 ? "block" : "none";
        }

        // FUNGSI TAMBAH ATAU UPDATE (MENYIMPAN KE SUPABASE)
        addForm.addEventListener('submit', async function(e) {
            e.preventDefault();
            const submitBtn = document.getElementById('submitBtn');
            submitBtn.disabled = true;
            submitBtn.innerText = "Menyimpan...";

            const editId = document.getElementById('editId').value;
            const payload = {
                name: document.getElementById('inputName').value,
                sortDate: document.getElementById('inputSortDate').value,
                prize: document.getElementById('inputPrize').value,
                link: document.getElementById('inputLink').value
            };

            let deadlineText = document.getElementById('inputDeadlineText').value.trim();
            if (!deadlineText) {
                const dateObj = new Date(payload.sortDate);
                const months = ["Jan", "Feb", "Mar", "Apr", "Mei", "Jun", "Jul", "Agu", "Sep", "Okt", "Nov", "Des"];
                payload.deadlineText = `${dateObj.getDate()} ${months[dateObj.getMonth()]}`;
            } else {
                payload.deadlineText = deadlineText;
            }

            try {
                if (editId) {
                    // Update ke Supabase
                    const { data, error } = await db.from('lombas').update(payload).eq('id', editId).select();
                    if (error) throw error;
                    
                    // Update array lokal
                    lombas = lombas.map(item => item.id == editId ? data[0] : item);
                    alert("Informasi lomba berhasil diperbarui!");
                } else {
                    // Insert ke Supabase
                    const { data, error } = await db.from('lombas').insert([payload]).select();
                    if (error) throw error;
                    
                    // Push ke array lokal
                    lombas.push(data[0]);
                    alert("Lomba baru berhasil ditambahkan!");
                }
                
                resetForm();
                renderTable();
            } catch (error) {
                alert("Gagal menyimpan ke Database: " + error.message);
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerText = "Simpan ke Database";
            }
        });

        // FUNGSI HAPUS (DELETE DARI SUPABASE)
        async function deleteItem(id) {
            if (confirm("Apakah kamu yakin ingin menghapus lomba ini secara permanen dari Database?")) {
                try {
                    const { error } = await db.from('lombas').delete().eq('id', id);
                    if (error) throw error;

                    lombas = lombas.filter(item => item.id != id);
                    renderTable();
                } catch (error) {
                    alert("Gagal menghapus data: " + error.message);
                }
            }
        }

        // FUNGSI PERSIAPAN EDIT
        function startEdit(id) {
            const item = lombas.find(l => l.id == id);
            if (!item) return;

            document.getElementById('editId').value = item.id;
            document.getElementById('inputName').value = item.name;
            document.getElementById('inputSortDate').value = item.sortDate;
            document.getElementById('inputDeadlineText').value = item.deadlineText;
            document.getElementById('inputPrize').value = item.prize;
            document.getElementById('inputLink').value = item.link;

            document.getElementById('formTitle').innerText = "✏️ Edit Informasi Lomba";
            document.getElementById('submitBtn').innerText = "Update ke Database";
            document.getElementById('submitBtn').style.backgroundColor = "var(--btn-edit)";
            document.getElementById('cancelBtn').style.display = "block";
            
            document.getElementById('addLombaForm').scrollIntoView({ behavior: 'smooth' });
        }

        // RESET FORM
        function resetForm() {
            addForm.reset();
            document.getElementById('editId').value = "";
            document.getElementById('formTitle').innerText = "➕ Tambah Lomba Baru";
            document.getElementById('submitBtn').innerText = "Simpan ke Database";
            document.getElementById('submitBtn').style.backgroundColor = "var(--btn-submit)";
            document.getElementById('cancelBtn').style.display = "none";
        }

        // FUNGSI SORTING MANUAL
        function toggleSortName() {
            if (nameSortDirection === 'none' || nameSortDirection === 'desc') {
                nameSortDirection = 'asc';
            } else {
                nameSortDirection = 'desc';
            }
            renderTable();
        }

        // AUTOSAVE CATATAN KE SUPABASE
        const notesArea = document.getElementById('sharedNotes');
        const saveStatus = document.getElementById('saveStatus');
        let typingTimer;

        notesArea.addEventListener('input', function() {
            clearTimeout(typingTimer);
            saveStatus.style.display = 'none';
            
            // Simpan setelah berhenti ngetik 1.5 detik agar tidak memberatkan server
            typingTimer = setTimeout(async () => {
                saveStatus.innerText = "Menyimpan ke server...";
                saveStatus.style.display = 'block';
                saveStatus.style.color = "#facc15"; // Warna kuning pas proses
                
                try {
                    const { error } = await db.from('notes').update({ content: notesArea.value }).eq('id', 1);
                    if (error) throw error;
                    
                    saveStatus.innerText = "Tersimpan ke Database ✔️";
                    saveStatus.style.color = "var(--col-prize)"; // Kembali hijau
                } catch (error) {
                    saveStatus.innerText = "Gagal menyimpan!";
                    saveStatus.style.color = "var(--col-deadline)"; // Merah kalau gagal
                    console.error("Notes Error:", error.message);
                }

                setTimeout(() => saveStatus.style.display = 'none', 3000);
            }, 1500);
        });

        // JALANKAN SAAT HALAMAN DIMUAT
        fetchData();
    </script>
</body>
</html>
